version: "3.9"

x-common-env: &common-env
  DATABASE_URL: "postgresql://aiplatform:aiplatform@postgres:5432/aiplatform"
  REDIS_URL: "redis://redis:6379"
  LLM_BASE_URL: "http://host.docker.internal:9999/v1"

services:
  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiplatform
      POSTGRES_PASSWORD: aiplatform
      POSTGRES_DB: aiplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aiplatform" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5


  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_backend
    restart: unless-stopped
    environment:
      <<: *common-env
      JWT_SECRET: "${JWT_SECRET:-super-secret-jwt-key-change-in-prod}"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_MINUTES: "60"
      LLM_BASE_URL: "${LLM_BASE_URL:-http://host.docker.internal:9999/v1}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-http://host.docker.internal:9999/v1}"
      ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8080 --reload"

  # ── RQ Worker (document ingestion) ──────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_worker
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: rq worker --with-scheduler --url redis://redis:6379 document_queue

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-frontend-secret}"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ai_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ai_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  upload_data:
  models_data:


networks:
  default:
    name: ai_platform_net
